# Fly.io config. Run `fly launch --no-deploy` once to claim a name + region;
# Fly will rewrite `app` and `primary_region` for you. Then:
#
#   fly secrets set CORS_ORIGINS=https://<your-frontend>.pages.dev
#   fly secrets set OPENAI_API_KEY=sk-...   # optional; stub mode runs without
#   fly deploy
#
# Free tier: scale-to-zero. The machine sleeps when idle and wakes in ~1-3s
# on the first request. Set `min_machines_running = 1` to keep one warm.

app = "resume-tailor-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
