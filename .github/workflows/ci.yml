name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same PR/branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          # Cache invalidates when uv.lock changes.
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync --all-extras --frozen

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Playwright Chromium
        # --with-deps installs system libraries needed for headless Chromium.
        # Cheap when the browser binary is already cached.
        run: uv run playwright install --with-deps chromium

      # Each step is its own action so the PR UI shows exactly which check failed.
      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest
